# SmartPort Galicia Operations Center - Docker Compose Stack
# Infrastructure: FIWARE + NGSI-LD + Real-time IoT + Analytics + Backend

services:
  # ==================== DATABASES ====================

  # MongoDB: Document storage for Orion-LD metadata and IoT Agent configuration
  mongodb:
    image: mongo:4.4
    container_name: smartports_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: smartports
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - smartports_net
    healthcheck:
      test: ["CMD", "mongo", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # PostgreSQL: Operational database for transactional data
  postgres:
    image: postgres:16-alpine
    container_name: smartports_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartports}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      POSTGRES_DB: ${POSTGRES_DB:-smartports_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smartports_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartports}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # TimescaleDB: Time-series database (specialized PostgreSQL with TimescaleDB extension)
  # Stores historical sensor data and observations from QuantumLeap
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: smartports_timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${TIMESCALE_USER:-quantumleap}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD:-timescale123}
      POSTGRES_DB: ${TIMESCALE_DB:-quantumleap}
    ports:
      - "${TIMESCALE_PORT:-5433}:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    networks:
      - smartports_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TIMESCALE_USER:-quantumleap}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis: Cache and message broker for Celery tasks
  redis:
    image: redis:7-alpine
    container_name: smartports_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - smartports_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ==================== MESSAGE BROKER ====================

  # Mosquitto: MQTT broker for IoT sensor data
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: smartports_mosquitto
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_WEBSOCKET_PORT:-9001}:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    networks:
      - smartports_net
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -t '$$SYS/broker/version' -C 1 -W 3 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ==================== FIWARE CONTEXT & PERSISTENCE ====================

  # Orion-LD: NGSI-LD Context Broker (stores current state of entities)
  orion-ld:
    image: fiware/orion-ld:latest
    container_name: smartports_orion_ld
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      ORIONLD_MONGO_HOST: mongodb
      ORIONLD_MONGO_PORT: 27017
      ORIONLD_MONGO_DB: ${MONGO_LD_DB:-orion-ld}
      ORIONLD_MONGO_USER: ${MONGO_ROOT_USER:-admin}
      ORIONLD_MONGO_PASSWORD: ${MONGO_ROOT_PASSWORD:-admin123}
      ORIONLD_LOG_LEVEL: ${ORION_LOG_LEVEL:-INFO}
    ports:
      - "${ORION_LD_PORT:-1026}:1026"
    networks:
      - smartports_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:1026/version || curl -sf http://localhost:1026/ngsi-ld/v1/entities?limit=1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # IoT Agent JSON: Transforms MQTT/HTTP messages into NGSI-LD entities
  iot-agent-json:
    image: fiware/iotagent-json:latest
    container_name: smartports_iot_agent_json
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
      orion-ld:
        condition: service_healthy
    environment:
      IOTA_CB_HOST: orion-ld
      IOTA_CB_PORT: 1026
      IOTA_CB_PROTOCOL: http
      IOTA_MQTT_HOST: mosquitto
      IOTA_MQTT_PORT: 1883
      IOTA_MONGO_HOST: mongodb
      IOTA_MONGO_PORT: 27017
      IOTA_MONGO_DB: ${MONGO_IOT_DB:-iot-agent}
      IOTA_MONGO_USER: ${MONGO_ROOT_USER:-admin}
      IOTA_MONGO_PASSWORD: ${MONGO_ROOT_PASSWORD:-admin123}
      IOTA_LOG_LEVEL: ${IOT_AGENT_LOG_LEVEL:-INFO}
      IOTA_NORTH_PORT: 4041
      IOTA_HTTP_PORT: 7896
    ports:
      - "${IOT_AGENT_API_PORT:-4041}:4041"
      - "${IOT_AGENT_HTTP_PORT:-7896}:7896"
    networks:
      - smartports_net
    healthcheck:
      test: curl -f http://localhost:4041/iot/about || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # QuantumLeap: Time-series manager (subscribes to Orion, persists to TimescaleDB)
  quantumleap:
    image: orchestracities/quantumleap:1.0.0
    container_name: smartports_quantumleap
    restart: unless-stopped
    depends_on:
      orion-ld:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      LOGLEVEL: ${QUANTUMLEAP_LOG_LEVEL:-INFO}
      QL_DEFAULT_DB: timescale
      QL_DEFAULT_INSTANCE_ID: smartports_main
      POSTGRES_HOST: timescaledb
      POSTGRES_PORT: 5432
      POSTGRES_DB_NAME: ${TIMESCALE_DB:-quantumleap}
      POSTGRES_DB_USER: ${TIMESCALE_USER:-quantumleap}
      POSTGRES_DB_PASS: ${TIMESCALE_PASSWORD:-timescale123}
      POSTGRES_USE_SSL: ${POSTGRES_USE_SSL:-False}
      CACHE_SIZE: 128
      ENABLE_CACHING: "true"
    ports:
      - "${QUANTUMLEAP_PORT:-8668}:8668"
    networks:
      - smartports_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8668/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==================== BACKEND & INTELLIGENCE ====================

  # Backend: FastAPI server (REST API, business logic, integration layer)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartports_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      orion-ld:
        condition: service_healthy
      quantumleap:
        condition: service_healthy
    environment:
      # Core
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-smartports}:${POSTGRES_PASSWORD:-postgres123}@postgres:5432/${POSTGRES_DB:-smartports_db}
      
      # FIWARE
      ORION_BASE_URL: http://orion-ld:1026
      QUANTUMLEAP_BASE_URL: http://quantumleap:8668
      
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
      
      # Celery
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/2
      
      # Security & API
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      API_V1_PREFIX: /api/v1
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      
      # Ports
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8000
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    networks:
      - smartports_net
    healthcheck:
      test: curl -f http://localhost:8000/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Celery Worker: Async ML tasks (forecasting, recommendations, background jobs)
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartports_celery_worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      # Core
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-smartports}:${POSTGRES_PASSWORD:-postgres123}@postgres:5432/${POSTGRES_DB:-smartports_db}
      
      # FIWARE
      ORION_BASE_URL: http://orion-ld:1026
      QUANTUMLEAP_BASE_URL: http://quantumleap:8668
      
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
      
      # Celery
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/2
    command: celery -A tasks.celery worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app
    networks:
      - smartports_net
    healthcheck:
      test: ["CMD", "sh", "-c", "celery -A tasks.celery inspect active || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ==================== PRESENTATION & MONITORING ====================

  # Nginx: Reverse proxy, static file serving, rate limiting, SSL termination
  nginx:
    image: nginx:alpine
    container_name: smartports_nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      - nginx_cache:/var/cache/nginx
    networks:
      - smartports_net
    healthcheck:
      test: curl -f http://localhost:80/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Grafana: Analytics dashboards and visualization
  grafana:
    image: grafana/grafana:latest
    container_name: smartports_grafana
    restart: unless-stopped
    depends_on:
      quantumleap:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-worldmap-panel
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_storage:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - smartports_net
    healthcheck:
      test: curl -f http://localhost:3000/api/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Prometheus: Metrics collection and alerting (optional but recommended)
  prometheus:
    image: prom/prometheus:latest
    container_name: smartports_prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - smartports_net
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:9090/-/healthy || exit 1
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

# ==================== NETWORKS ====================

networks:
  smartports_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16

# ==================== VOLUMES ====================

volumes:
  # Databases
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  postgres_data:
    driver: local
  timescaledb_data:
    driver: local
  
  # Cache & Queue
  redis_data:
    driver: local
  
  # Message Broker
  mosquitto_data:
    driver: local
  mosquitto_logs:
    driver: local
  
  # Monitoring & Visualization
  grafana_storage:
    driver: local
  prometheus_data:
    driver: local
  
  # Nginx
  nginx_cache:
    driver: local
