# Mosquitto MQTT Broker Configuration
# SmartPort Galicia Operations Center

# ==================== NETWORK ====================
# Listen on all interfaces for MQTT
listener 1883
protocol mqtt
max_connections -1

# WebSocket support
listener 9001
protocol websockets

# ==================== PERSISTENCE ====================
persistence true
persistence_location /mosquitto/data/

# ==================== LOGGING ====================
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
log_timestamp true

# ==================== SECURITY ====================
# Allow anonymous connections (can be restricted in production)
allow_anonymous true

# ==================== PERFORMANCE ====================
max_queued_messages 0
message_size_limit 0
