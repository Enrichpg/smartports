# Prometheus Configuration - SmartPort Galicia Operations Center
# Metrics collection from services

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'smartports-main'

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Backend FastAPI server
  - job_name: 'backend'
    scrape_interval: 30s
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'

  # Grafana monitoring
  - job_name: 'grafana'
    scrape_interval: 30s
    static_configs:
      - targets: ['grafana:3000']
    metrics_path: '/metrics'

  # Redis monitoring
  - job_name: 'redis'
    scrape_interval: 30s
    static_configs:
      - targets: ['redis:6379']

  # PostgreSQL (via postgres_exporter if available)
  - job_name: 'postgres'
    scrape_interval: 30s
    static_configs:
      - targets: ['postgres:5432']
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: postgres:9187

  # Mosquitto MQTT broker
  - job_name: 'mosquitto'
    scrape_interval: 30s
    static_configs:
      - targets: ['mosquitto:1883']

  # Orion-LD context broker
  - job_name: 'orion-ld'
    scrape_interval: 30s
    static_configs:
      - targets: ['orion-ld:1026']
    metrics_path: '/metrics'

  # QuantumLeap time-series manager
  - job_name: 'quantumleap'
    scrape_interval: 30s
    static_configs:
      - targets: ['quantumleap:8668']
    metrics_path: '/metrics'

# ==================== ALERTING ====================
# Optional: Define alert rules

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Alert rules (if using external alert manager)
rule_files: []
  # - "/etc/prometheus/alert_rules.yml"
