version: '3.8'

# SmartPort Galicia Operations Center - Docker Compose Orchestration
# 12 Core Services + Optional (Prometheus, Ollama)
# 
# Usage:
#   docker-compose -f docker/docker-compose.yml up -d
#   docker-compose -f docker/docker-compose.yml down
#   docker-compose -f docker/docker-compose.yml logs -f

services:
  # ========================================================================
  # 1. MQTT BROKER - Mosquitto
  # ========================================================================
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: smartport_mosquitto
    ports:
      - "${MOSQUITTO_PORT}:${MOSQUITTO_PORT}"
      - "8883:8883"
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    environment:
      - MOSQUITTO_USER=${MOSQUITTO_USER}
      - MOSQUITTO_PASSWORD=${MOSQUITTO_PASSWORD}
    healthcheck:
      test: mosquitto_sub -h localhost -t test | head -n 1 || false
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - smartport_network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  # ========================================================================
  # 2. IoT AGENT JSON - Transform MQTT to NGSI-LD
  # ========================================================================
  iot-agent-json:
    image: fiware/iotagent-json:latest
    container_name: smartport_iot_agent
    depends_on:
      - mosquitto
      - orion-ld
    ports:
      - "${IOT_AGENT_PORT}:${IOT_AGENT_PORT}"
    environment:
      - FIWARE_SERVICE=${ORION_SERVICE}
      - FIWARE_SERVICEPATH=${ORION_SUBSERVICE}
      - IOTA_MQTT_HOST=mosquitto
      - IOTA_MQTT_PORT=${MOSQUITTO_PORT}
      - IOTA_MQTT_USERNAME=${MOSQUITTO_USER}
      - IOTA_MQTT_PASSWORD=${MOSQUITTO_PASSWORD}
      - IOTA_CB_HOST=orion-ld
      - IOTA_CB_PORT=${ORION_PORT}
      - IOTA_CB_NGSI_VERSION=ld
      - IOTA_LOG_LEVEL=DEBUG
      - IOTA_NORTH_PORT=${IOT_AGENT_PORT}
    healthcheck:
      test: curl -f http://localhost:${IOT_AGENT_PORT}/iot/about || exit 1
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - smartport_network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  # ========================================================================
  # 3. ORION-LD - NGSI-LD Context Broker
  # ========================================================================
  orion-ld:
    image: fiware/orion-ld:latest
    container_name: smartport_orion_ld
    depends_on:
      - mongodb
    ports:
      - "${ORION_PORT}:${ORION_PORT}"
    environment:
      - FIWARE_SERVICE=${ORION_SERVICE}
      - FIWARE_SERVICEPATH=${ORION_SUBSERVICE}
      - ORIONLD_MONGO_HOST=mongodb:27017
      - ORIONLD_MONGO_USER=${MONGODB_USER}
      - ORIONLD_MONGO_PASSWORD=${MONGODB_PASSWORD}
    command: -logLevel DEBUG -mongo mongodb://mongodb:27017 -dbName oriondb
    healthcheck:
      test: curl -f http://localhost:${ORION_PORT}/version || exit 1
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - smartport_network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  # ========================================================================
  # 4. QUANTUMLEAP - Time-Series Manager
  # ========================================================================
  quantumleap:
    image: smartsdk/quantumleap:latest
    container_name: smartport_quantumleap
    depends_on:
      - timescaledb
    ports:
      - "${QUANTUMLEAP_PORT}:${QUANTUMLEAP_PORT}"
    environment:
      - FIWARE_SERVICE=${ORION_SERVICE}
      - FIWARE_SERVICEPATH=${ORION_SUBSERVICE}
      - QLDB_HOST=timescaledb
      - QLDB_PORT=5432
      - QLDB_DBNAME=${TIMESCALEDB_DB}
      - QLDB_USER=${TIMESCALEDB_USER}
      - QLDB_PASSWD=${TIMESCALEDB_PASSWORD}
      - QL_DEFAULT_DB=timescaledb
    healthcheck:
      test: curl -f http://localhost:${QUANTUMLEAP_PORT}/v2/version || exit 1
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - smartport_network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  # ========================================================================
  # 5. TIMESCALEDB - Time-Series Database (PostgreSQL + TimescaleDB extension)
  # ========================================================================
  timescaledb:
    image: timescale/timescaledb-ha:latest
    container_name: smartport_timescaledb
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_INITDB_ARGS=-c shared_buffers=256MB -c max_connections=200
      - POSTGRES_HOST_AUTH_METHOD=md5
      - POSTGRES_MULTIPLE_EXTENSIONS=timescaledb,postgis
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U ${TIMESCALEDB_USER} -h localhost
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - smartport_network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    # Initialize database
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "max_connections=200"

  # ========================================================================
  # 6. MONGODB - Document Store (for Orion entity storage)
  # ========================================================================
  mongodb:
    image: mongo:7.0
    container_name: smartport_mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGODB_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGODB_PASSWORD}
      - MONGO_INITDB_DATABASE=oriondb
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - smartport_network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  # ========================================================================
  # 7. POSTGRESQL - Operational Database
  # ========================================================================
  postgres:
    image: postgres:15
    container_name: smartport_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_INITDB_ARGS=-c max_connections=100
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U ${POSTGRES_USER} -h localhost
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - smartport_network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  # ========================================================================
  # 8. REDIS - Cache & Task Queue
  # ========================================================================
  redis:
    image: redis:7.0
    container_name: smartport_redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - smartport_network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  # ========================================================================
  # 9. FASTAPI BACKEND - Operational API & WebSocket Server
  # ========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartport_backend
    depends_on:
      - postgres
      - redis
      - orion-ld
      - quantumleap
      - mosquitto
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
      - "${BACKEND_WEBSOCKET_PORT}:${BACKEND_WEBSOCKET_PORT}"
    environment:
      # Database
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - QUANTUMLEAP_URL=http://quantumleap:${QUANTUMLEAP_PORT}
      - ORION_URL=http://orion-ld:${ORION_PORT}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - MQTT_BROKER=${MOSQUITTO_HOST}
      - MQTT_PORT=${MOSQUITTO_PORT}
      - MQTT_USER=${MOSQUITTO_USER}
      - MQTT_PASSWORD=${MOSQUITTO_PASSWORD}
      # Backend config
      - BACKEND_HOST=${BACKEND_HOST}
      - BACKEND_PORT=${BACKEND_PORT}
      - BACKEND_DEBUG=${BACKEND_DEBUG}
      - BACKEND_LOG_LEVEL=${BACKEND_LOG_LEVEL}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - JWT_EXPIRATION_HOURS=${JWT_EXPIRATION_HOURS}
      # FIWARE
      - FIWARE_SERVICE=${ORION_SERVICE}
      - FIWARE_SERVICEPATH=${ORION_SUBSERVICE}
      # Celery
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/1
      # ML
      - PROPHET_FORECAST_DAYS=${PROPHET_FORECAST_DAYS}
      - PROPHET_RETRAIN_SCHEDULE=${PROPHET_RETRAIN_SCHEDULE}
      # LLM
      - OLLAMA_HOST=${OLLAMA_HOST}
      - OLLAMA_PORT=${OLLAMA_PORT}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      # Application
      - SITE_NAME=${SITE_NAME}
      - SITE_URL=${SITE_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - PILOT_PORTS=${PILOT_PORTS}
    volumes:
      - ./backend:/app
    healthcheck:
      test: curl -f http://localhost:${BACKEND_PORT}/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - smartport_network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  # ========================================================================
  # 10. CELERY WORKER - Async ML Tasks
  # ========================================================================
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartport_celery_worker
    depends_on:
      - redis
      - backend
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/1
      - BACKEND_LOG_LEVEL=${BACKEND_LOG_LEVEL}
      - PROPHET_FORECAST_DAYS=${PROPHET_FORECAST_DAYS}
      - FIWARE_SERVICE=${ORION_SERVICE}
      - FIWARE_SERVICEPATH=${ORION_SUBSERVICE}
      - ORION_URL=http://orion-ld:${ORION_PORT}
      - QUANTUMLEAP_URL=http://quantumleap:${QUANTUMLEAP_PORT}
    volumes:
      - ./backend:/app
    command: celery -A app.tasks worker --loglevel=info --concurrency=4
    networks:
      - smartport_network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  # ========================================================================
  # 11. NGINX - Reverse Proxy & TLS
  # ========================================================================
  nginx:
    image: nginx:alpine
    container_name: smartport_nginx
    depends_on:
      - backend
      - grafana
    ports:
      - "${NGINX_HTTP_PORT}:80"
      - "${NGINX_HTTPS_PORT}:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      - nginx_certs:/etc/nginx/certs:ro
      - nginx_cache:/var/cache/nginx
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:80/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - smartport_network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  # ========================================================================
  # 12. GRAFANA - Dashboards & Analytics
  # ========================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: smartport_grafana
    depends_on:
      - quantumleap
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana_storage:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    healthcheck:
      test: curl -f http://localhost:3000/api/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - smartport_network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  # ========================================================================
  # OPTIONAL: PROMETHEUS - Metrics Collection
  # ========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: smartport_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - smartport_network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    profiles:
      - monitoring

  # ========================================================================
  # OPTIONAL: OLLAMA - Local LLM
  # ========================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: smartport_ollama
    ports:
      - "${OLLAMA_PORT}:${OLLAMA_PORT}"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:${OLLAMA_PORT}
    healthcheck:
      test: curl -f http://localhost:${OLLAMA_PORT}/api/tags || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - smartport_network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    profiles:
      - llm
    # Note: LLM model (Llama) must be pulled manually:
    # docker exec smartport_ollama ollama pull llama2

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  smartport_network:
    driver: bridge

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  # Broker
  mosquitto_data:
    driver: local
  mosquitto_logs:
    driver: local

  # Databases
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  postgres_data:
    driver: local
  timescaledb_data:
    driver: local
  redis_data:
    driver: local

  # Reverse Proxy
  nginx_certs:
    driver: local
  nginx_cache:
    driver: local

  # Dashboards
  grafana_storage:
    driver: local

  # Monitoring
  prometheus_data:
    driver: local

  # LLM
  ollama_models:
    driver: local
